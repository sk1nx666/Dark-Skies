name: Build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Select release JAR
        id: jar
        run: |
          JAR=$(find build/libs -maxdepth 1 -name 'dark-skies-*.jar' ! -name '*-sources.jar' | head -1)
          if [ ! -f "$JAR" ]; then
            echo "No remapped dark-skies jar found"; ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dark-skies-mod
          path: ${{ steps.jar.outputs.path }}
